services:
  express-app:
    image: niriaz/express-app
    container_name: express-app
    ports:
      - "127.0.0.1:8080:8080"

  watchtower:
    image: nickfedor/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
    command: express-app
